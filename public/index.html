<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>North Forge — Pine Barron Farms</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { font-size:16px; }
    body { font-family:Georgia,'Times New Roman',serif; background:#020617;
           color:#ffffff; height:100vh; overflow:hidden; }

    #app-shell   { display:flex; flex-direction:column; height:100vh; }
    #topbar      { flex-shrink:0; background:rgba(2,6,23,0.98);
                   backdrop-filter:blur(16px);
                   border-bottom:2px solid #38bdf844;
                   padding:14px 24px;
                   display:flex; align-items:center; gap:14px; }
    #room-content { flex:1; overflow-y:auto; position:relative; z-index:5; }
    #bottomnav   { flex-shrink:0; background:rgba(2,6,23,0.98);
                   backdrop-filter:blur(20px);
                   border-top:2px solid #38bdf844;
                   display:flex; overflow-x:auto; padding:8px 10px; gap:4px;
                   scrollbar-width:none; }

    #sky-canvas  { position:fixed; inset:0; z-index:0; pointer-events:none;
                   transition:background 1.5s ease; }

    #topbar-left  { display:flex; align-items:center; gap:12px; flex:1; }
    #topbar-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    #topbar-status{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .farm-title   { font-weight:900; font-size:1.3em; color:#ffffff;
                    text-shadow:0 0 20px rgba(255,255,255,0.2); }
    .farm-sub     { font-size:0.62em; color:#94a3b8; margin-top:8px; }
    .status-dot   { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .status-dot.on  { background:#22c55e; box-shadow:0 0 10px #22c55e; }
    .status-dot.off { background:#334155; }
    .status-label { font-size:0.65em; font-weight:900; }
    .pill {
      font-size:0.62em; color:#cbd5e1; font-weight:700;
      background:rgba(15,23,42,0.9);
      border:1px solid #334155;
      border-radius:20px; padding:4px 12px; }

    .tbtn { display:flex; align-items:center; gap:6px;
            background:rgba(15,23,42,0.9); border:2px solid #334155;
            border-radius:10px; color:#e2e8f0; padding:8px 16px;
            cursor:pointer; font-size:0.72em; font-weight:900;
            font-family:Georgia,serif; transition:all 0.2s; }
    .tbtn:hover { color:#fff; border-color:#38bdf8;
                  background:rgba(56,189,248,0.1); }
    .fsbtn { width:38px; height:38px; background:none; border:none;
             color:#fff; cursor:pointer; font-size:1.4em; font-weight:900;
             font-family:Georgia,serif; }
    .fs-row { display:flex; align-items:center;
              background:rgba(15,23,42,0.9); border:2px solid #334155;
              border-radius:10px; padding:2px; gap:2px; }
    .fs-val { width:48px; text-align:center; font-size:0.65em;
              font-weight:900; color:#38bdf8; }

    .nav-tab { display:flex; flex-direction:column; align-items:center;
               gap:5px; padding:10px 16px; background:none; border:none;
               border-top:4px solid transparent; cursor:pointer;
               color:#94a3b8; transition:all 0.2s; min-width:76px;
               white-space:nowrap; font-family:Georgia,serif; }
    .nav-tab .tab-icon  { font-size:1.6em; }
    .nav-tab .tab-label { font-size:0.65em; font-weight:900;
                          letter-spacing:0.5px; text-transform:uppercase; }
    .nav-tab:hover  { color:#ffffff; background:rgba(56,189,248,0.08); }
    .nav-tab.active { color:#38bdf8; border-top-color:#38bdf8;
                      background:rgba(56,189,248,0.12); }

    .toast { position:fixed; top:18px; left:50%; transform:translateX(-50%);
             background:#0284c7; color:#fff; font-weight:900;
             padding:12px 28px; border-radius:30px; z-index:500;
             font-size:0.82em; box-shadow:0 8px 28px rgba(0,0,0,0.5);
             white-space:nowrap; animation:fadeDown 0.3s ease; }
    @keyframes fadeDown {
      from { opacity:0; transform:translateX(-50%) translateY(-10px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }

    .north-peek { position:fixed; bottom:100px; right:0; z-index:400;
                  display:flex; align-items:flex-end; gap:0;
                  animation:peekSlide 0.4s ease-out forwards; }
    @keyframes peekSlide {
      from { opacity:0; transform:translateX(40px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .peek-bubble { background:rgba(2,6,23,0.98); border:2px solid #38bdf8;
                   border-radius:18px 18px 4px 18px; padding:16px 20px;
                   max-width:260px; margin-right:8px;
                   box-shadow:0 8px 32px rgba(56,189,248,0.4); }
    .peek-label  { color:#38bdf8; font-size:0.58em; font-weight:900;
                   letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
    .peek-msg    { color:#ffffff; font-size:0.82em; line-height:1.55;
                   margin-bottom:12px; font-weight:500; }
    .peek-actions{ display:flex; gap:8px; }
    .peek-actions button { border:none; border-radius:8px; padding:7px 14px;
                           font-weight:900; font-size:0.68em; cursor:pointer;
                           font-family:Georgia,serif; }
    .peek-actions button:first-child { background:#38bdf8; color:#020617; }
    .peek-actions button:last-child  { background:rgba(255,255,255,0.08);
                                       color:#94a3b8; }
    .peek-avatar { width:54px; height:54px; border-radius:50% 50% 50% 8px;
                   background:linear-gradient(135deg,#0ea5e9,#0284c7);
                   display:flex; align-items:center; justify-content:center;
                   font-size:1.6em; box-shadow:0 0 25px rgba(56,189,248,0.5); }

    #naughty-layer { position:fixed; inset:0; pointer-events:none;
                     z-index:300; overflow:hidden; }
    .naughty-animal { position:absolute; font-size:3em; }
    .anim-peek      { bottom:-130px; left:28%;
                      animation:aPeek 4.5s ease-in-out forwards; }
    .anim-peekRight { right:-130px; bottom:80px;
                      animation:aPeekR 4.5s ease-in-out forwards; }
    .anim-sprintFast{ bottom:80px; left:-15%;
                      animation:aSprint 4s linear forwards; }
    .anim-ufoHover  { top:-15%; left:75%;
                      animation:aUfo 4.5s ease-in-out forwards; }
    @keyframes aPeek   { 0%,100%{bottom:-130px} 20%,80%{bottom:80px} }
    @keyframes aPeekR  { 0%,100%{right:-130px}  20%,80%{right:22px}  }
    @keyframes aSprint { 0%{left:-15%} 100%{left:120%} }
    @keyframes aUfo    { 0%{top:-15%;opacity:0} 15%{opacity:1}
                         80%{top:20%;opacity:1} 100%{top:-15%;opacity:0} }

    .room-wrap   { padding:24px 28px 36px; }
    .panel-desc  { color:#94a3b8; font-size:0.88em; line-height:1.7;
                   margin-bottom:22px; border-left:4px solid #38bdf8;
                   padding-left:16px; font-weight:600; }
    .content-card{ background:rgba(15,23,42,0.92); padding:22px;
                   border-radius:18px; border:2px solid #1e293b;
                   cursor:pointer; transition:all 0.25s; }
    .content-card:hover { border-color:#38bdf8; transform:translateY(-4px);
                          box-shadow:0 12px 30px rgba(0,0,0,0.5); }
    .list-btn    { display:block; width:100%;
                   background:rgba(15,23,42,0.92);
                   border:2px solid #1e293b; padding:14px 18px;
                   border-radius:14px; color:#ffffff; text-align:left;
                   margin-bottom:10px; cursor:pointer; font-weight:900;
                   transition:all 0.25s; font-size:0.88em;
                   font-family:Georgia,serif; }
    .list-btn:hover { border-color:#38bdf8; transform:translateX(5px);
                      background:rgba(56,189,248,0.08); }
    .error-room  { padding:48px; text-align:center; color:#ef4444;
                   font-size:1.2em; line-height:1.8; }

    ::-webkit-scrollbar       { width:7px; height:7px; }
    ::-webkit-scrollbar-track { background:#020617; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:7px; }

    /* ── CHAT ROOM ───────────────────────────────────────────────── */
    .no-key-banner{background:rgba(245,158,11,0.1);border-bottom:2px solid #f59e0b44;padding:10px 20px;font-size:0.76em;color:#fbbf24;font-weight:700;}
    .chat-mode-bar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:2px solid #1e293b;background:rgba(2,6,23,0.98);flex-shrink:0;}
    .mode-btn{background:rgba(15,23,42,0.9);border:2px solid #334155;border-radius:10px;padding:9px 18px;color:#94a3b8;cursor:pointer;font-weight:900;font-size:0.76em;font-family:Georgia,serif;transition:all .2s;}
    .mode-btn:hover{color:#cbd5e1;border-color:#475569;}
    .mode-btn.active{color:#fff;border-color:#38bdf8;background:rgba(56,189,248,0.12);}
    .clear-btn{background:none;border:2px solid #334155;border-radius:10px;padding:9px 14px;color:#94a3b8;cursor:pointer;font-size:0.76em;font-family:Georgia,serif;transition:all .2s;}
    .clear-btn:hover{border-color:#ef4444;color:#ef4444;}
    .pe-wrap{flex:1;overflow-y:auto;padding:20px 24px;}
    .pe-title{font-weight:900;font-size:1.1em;color:#fff;margin-bottom:4px;}
    .pe-sub{color:#64748b;font-size:0.76em;margin-bottom:22px;line-height:1.55;}
    .pe-field{margin-bottom:20px;}
    .pe-label{font-size:0.62em;font-weight:900;color:#38bdf8;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block;}
    .pe-textarea{width:100%;background:rgba(15,23,42,0.95);border:2px solid #334155;border-radius:14px;padding:14px 16px;color:#fff;font-family:Georgia,serif;resize:none;outline:none;font-size:0.9em;transition:border-color .3s;min-height:80px;}
    .pe-textarea:focus{border-color:#38bdf8;}
    .pe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
    .pe-opt{background:rgba(2,6,23,0.9);border:2px solid #334155;border-radius:12px;padding:11px 13px;cursor:pointer;text-align:left;font-family:Georgia,serif;transition:all .2s;display:flex;align-items:center;gap:8px;}
    .pe-opt:hover:not(.maxed){border-color:#38bdf8;background:rgba(56,189,248,0.06);}
    .pe-opt.sel{border-color:#38bdf8;background:rgba(56,189,248,0.15);box-shadow:0 0 12px rgba(56,189,248,0.2);}
    .pe-opt.maxed{opacity:0.35;cursor:not-allowed;}
    .pe-opt-icon{font-size:1.3em;flex-shrink:0;}
    .pe-opt-name{font-weight:900;font-size:0.74em;color:#fff;}
    .pe-opt-sub{font-size:0.6em;color:#64748b;margin-top:1px;}
    .pe-select{width:100%;background:rgba(15,23,42,0.95);border:2px solid #334155;border-radius:12px;padding:12px 14px;color:#fff;font-family:Georgia,serif;font-size:0.88em;outline:none;cursor:pointer;}
    .pe-select:focus{border-color:#38bdf8;}
    option{background:#020617;}
    .pe-forge-btn{width:100%;background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#fff;border:none;border-radius:16px;padding:18px;font-weight:900;font-size:1.05em;cursor:pointer;font-family:Georgia,serif;transition:all .25s;margin-top:6px;box-shadow:0 6px 24px rgba(2,132,199,0.35);}
    .pe-forge-btn:hover:not(:disabled){transform:scale(1.02);}
    .pe-forge-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .pe-reset-btn{background:rgba(15,23,42,0.6);border:2px solid #334155;border-radius:16px;padding:18px 20px;color:#94a3b8;cursor:pointer;font-size:.86em;font-weight:900;font-family:Georgia,serif;transition:all .2s;white-space:nowrap;flex-shrink:0;}
    .pe-reset-btn:hover:not(:disabled){border-color:#38bdf8;color:#38bdf8;}
    .pe-reset-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .chat-msgs{flex:1;overflow-y:auto;padding:20px 24px 10px;}
    .msg-row{display:flex;gap:14px;margin-bottom:26px;align-items:flex-start;}
    .msg-row.user{flex-direction:row-reverse;}
    .msg-ava{width:46px;height:46px;border-radius:50% 50% 50% 8px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#0284c7);display:flex;align-items:center;justify-content:center;font-size:1.3em;}
    .msg-row.user .msg-ava{background:linear-gradient(135deg,#166534,#14532d);border-radius:50%;}
    .msg-bub{max-width:84%;background:rgba(15,23,42,0.95);border:2px solid #1e293b;padding:16px 20px;border-radius:6px 20px 20px 20px;}
    .msg-row.user .msg-bub{background:rgba(20,83,45,0.92);border-color:#14532d;border-radius:20px 6px 20px 20px;}
    .msg-lbl{color:#38bdf8;font-size:0.56em;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
    .msg-text{color:#f1f5f9;font-size:0.88em;line-height:1.8;white-space:pre-wrap;}
    .callsheet{background:linear-gradient(180deg,rgba(2,20,40,0.98),#000 30%);border:2px solid #38bdf8;border-radius:14px;padding:18px;margin-top:14px;box-shadow:0 0 28px rgba(56,189,248,0.18),inset 0 1px 0 rgba(56,189,248,0.1);}
    .cs-body{font-family:monospace;font-size:0.74em;color:#bae6fd;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-bottom:12px;}
    .cs-actions{display:flex;gap:10px;flex-wrap:wrap;}
    .cs-btn{border:none;border-radius:10px;padding:10px 18px;font-weight:900;font-size:0.72em;cursor:pointer;font-family:Georgia,serif;transition:all .2s;letter-spacing:0.3px;}
    .cs-btn:hover{transform:scale(1.05);filter:brightness(1.15);}
    .cs-copy{background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#fff;box-shadow:0 3px 10px rgba(2,132,199,0.4);}
    .cs-full{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;box-shadow:0 3px 10px rgba(124,58,237,0.4);}
    .cs-save{background:linear-gradient(135deg,#065f46,#059669);color:#fff;box-shadow:0 3px 10px rgba(5,150,105,0.4);}
    .cs-score{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;}
    .vs-badge{font-size:0.62em;font-weight:900;letter-spacing:0.5px;padding:7px 12px;border-radius:8px;margin-bottom:10px;line-height:1.5;display:block;}
    .north-thinking{display:flex;align-items:center;gap:12px;padding:12px 0;color:#38bdf8;font-weight:900;font-size:0.82em;}
    @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}} @keyframes spin{to{transform:rotate(360deg)}}
    .tdot{animation:pulse 1.2s ease-in-out infinite;}.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
    .chat-input-bar{padding:12px 20px 16px;background:rgba(2,6,23,0.98);border-top:2px solid #1e293b;display:flex;gap:10px;flex-shrink:0;}
    .chat-ta{flex:1;background:rgba(15,23,42,0.95);border:2px solid #334155;border-radius:14px;padding:13px 16px;color:#fff;font-family:Georgia,serif;resize:none;outline:none;font-size:0.9em;transition:border-color .3s;}
    .chat-ta:focus{border-color:#38bdf8;}
    .chat-send{background:linear-gradient(135deg,#0284c7,#0369a1);border:none;border-radius:14px;width:58px;color:#fff;cursor:pointer;font-size:1.4em;transition:all .25s;}
    .chat-send:hover{transform:scale(1.06);}

    /* ── MOBILE ≤640px ──────────────────────────────────────────── */
    @media (max-width: 640px) {
      #topbar         { padding: 8px 12px; gap: 8px; }
      .farm-title     { font-size: 1.1em; }
      .farm-sub       { display: none; }
      .pill           { display: none; }
      .fs-row         { display: none; }
      .nav-tab        { min-width: 44px; padding: 7px 8px; gap: 2px; }
      .nav-tab .tab-icon  { font-size: 1.3em; }
      .nav-tab .tab-label { display: none; }
      .room-wrap      { padding: 12px 12px 24px; }
      .north-peek     { bottom: 80px; right: 50%; transform: translateX(50%);
                        animation: peekSlideMobile 0.4s ease-out forwards; }
      @keyframes peekSlideMobile {
        from { opacity: 0; transform: translateX(50%) translateY(20px); }
        to   { opacity: 1; transform: translateX(50%) translateY(0); }
      }
      .peek-bubble    { max-width: 88vw; margin-right: 0; }
      .chat-ta        { font-size: 1rem; min-height: 44px; padding: 11px 14px; }
      .chat-send      { width: 46px; min-height: 44px; font-size: 1.2em; }
      .chat-input-bar { padding: 10px 12px 14px; gap: 8px; }
    }
  </style>
</head>
<body>

<div id="sky-canvas"></div>
<div id="naughty-layer"></div>
<div id="toast-slot"></div>
<div id="peek-slot"></div>

<div id="app-shell">

  <div id="topbar">
    <div id="topbar-left">
      <div>
        <div class="farm-title">🏚️ North Forge</div>
        <div class="farm-sub">Pine Barron Farms · Piscataway NJ</div>
      </div>
      <div id="topbar-status"></div>
    </div>
    <div id="topbar-right">
      <button class="tbtn" onclick="changeScene()">🌅 Sky</button>
      <div class="fs-row">
        <button class="fsbtn" onclick="bumpFont(-1)">−</button>
        <div class="fs-val" id="fs-display">16px</div>
        <button class="fsbtn" onclick="bumpFont(1)">+</button>
      </div>
    </div>
  </div>

  <div id="room-content"></div>

  <div id="bottomnav">
    <button class="nav-tab active" data-tab="home" onclick="goTo('home')">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">Home</span>
    </button>
    <button class="nav-tab" data-tab="chat" onclick="goTo('chat')">
      <span class="tab-icon">💬</span>
      <span class="tab-label">North</span>
    </button>
    <button class="nav-tab" data-tab="slots" onclick="goTo('slots')">
      <span class="tab-icon">🎰</span>
      <span class="tab-label">Slots</span>
    </button>
    <button class="nav-tab" data-tab="rocklab" onclick="goTo('rocklab')">
      <span class="tab-icon">⛏️</span>
      <span class="tab-label">Rock Lab</span>
    </button>
    <button class="nav-tab" data-tab="racing" onclick="goTo('racing')">
      <span class="tab-icon">🏁</span>
      <span class="tab-label">Racing</span>
    </button>
    <button class="nav-tab" data-tab="weird" onclick="goTo('weird')">
      <span class="tab-icon">👻</span>
      <span class="tab-label">Weird NJ</span>
    </button>
    <button class="nav-tab" data-tab="jeeb" onclick="goTo('jeeb')">
      <span class="tab-icon">🍄</span>
      <span class="tab-label">Jeeb</span>
    </button>
    <button class="nav-tab" data-tab="idioms" onclick="goTo('idioms')">
      <span class="tab-icon">🤬</span>
      <span class="tab-label">Idioms</span>
    </button>
    <button class="nav-tab" data-tab="platforms" onclick="goTo('platforms')"><span class="tab-icon">🎬</span><span class="tab-label">Platforms</span></button>
    <button class="nav-tab" data-tab="cast" onclick="goTo('cast')">
      <span class="tab-icon">🧠</span>
      <span class="tab-label">Cast</span>
    </button>
    <button class="nav-tab" data-tab="digest" onclick="goTo('digest')">
      <span class="tab-icon">📅</span>
      <span class="tab-label">Digest</span>
    </button>
    <button class="nav-tab" data-tab="profile" onclick="goTo('profile')">
      <span class="tab-icon">🎭</span>
      <span class="tab-label">My Profile</span>
    </button>
    <button class="nav-tab" data-tab="setup" onclick="goTo('setup')">
      <span class="tab-icon">🔑</span>
      <span class="tab-label">Setup</span>
    </button>
  </div>

</div>

<script type="module" src="./app.js"></script>
</body>
</html>
